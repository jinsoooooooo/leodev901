name: Deploy Next.js site to Pages

on:
  # 'main' 브랜치에 코드가 Push 될 때마다 이 스크립트가 실행됩니다.
  # 만약 기본 브랜치 이름이 'master'라면 "master"로 수정해 주세요.
  # push:
  #   branches: ["main"]
  workflow_dispatch:

# GitHub Pages 배포를 위해 필요한 권한 설정입니다.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # 현재 사용 중이신 Node 버전에 맞게 수정하셔도 됩니다.
          
      - name: Install dependencies
        # npm을 사용 중이시라면 아래 명령어를 그대로 두시고, 
        # yarn이나 pnpm을 사용하신다면 'yarn install' 등으로 변경해 주세요.
        run: npm install
        
      - name: Build with Next.js
        run: npm run build
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Level 1에서 설정한 정적 빌드 결과물 경로를 지정합니다.
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
