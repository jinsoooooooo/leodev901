<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Leo. Studio | Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2563EB",
                        "background-light": "#FFFFFF",
                        "background-dark": "#0f1823",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .glass-pattern {
            background-image: radial-gradient(circle at 2px 2px, rgba(0,0,0,0.03) 1px, transparent 0);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-6 py-6 md:px-12">
<div class="flex items-center gap-2 group cursor-pointer">
<div class="size-6 bg-primary rounded-sm flex items-center justify-center text-white">
<span class="material-symbols-outlined text-[18px] font-bold">star</span>
</div>
<h2 class="text-xl font-bold tracking-tight">Leo.</h2>
</div>
<a class="flex items-center gap-2 text-sm font-medium text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-sm">arrow_back</span>
            Back to Home
        </a>
</header>
<main class="flex-1 flex items-center justify-center p-6 glass-pattern">
<div class="w-full max-w-[440px]">
<div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-xl shadow-slate-200/50 dark:shadow-none p-8 md:p-10">
<div class="mb-10 text-center">
<h1 class="text-3xl font-bold tracking-tight mb-3">Welcome back</h1>
<p class="text-slate-500 text-sm">Enter your credentials to access the Leo studio.</p>
</div>
<form class="space-y-5" onsubmit="return false;">
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="email">
                            Email address
                        </label>
<div class="relative">
<input class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder:text-slate-400" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex items-center justify-between">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="password">
                                Password
                            </label>
<a class="text-xs font-medium text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative flex items-center">
<input class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder:text-slate-400" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<div class="pt-2">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-3.5 rounded-lg transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
<span>Sign In</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-100 dark:border-slate-800"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white dark:bg-slate-900 px-2 text-slate-400 font-medium">Or continue with</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 px-4 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-sm font-medium">
<img alt="Google Logo" class="size-4" data-alt="Google company color logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCCUGc6rrhVxVLxt9G105Inwz_nDmm3dtI8m53CH9luQENtQWnhinLchDJhIy1YLfKVxE6Kv7ipJynjorYcSM3RidAb69wG0KDgKQiIplCVmUAucxvWbamAw-l_au5mEEoC6jYRD3JYenfrFNhzKKk0sC1A5REawx9xYwYLdd0yx0J9IRfwidaWXKrSQMoih3pKPAx6fdhB87AiCwcbX39up71M4UmTi5TQDZXMtJzpQwjf9jI_0KIw99BJ58dxkSK_oX2kEIqoTvij"/>
                            Google
                        </button>
<button class="flex items-center justify-center gap-2 px-4 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-sm font-medium">
<span class="material-symbols-outlined text-lg">terminal</span>
                            SSO
                        </button>
</div>
</form>
</div>
<p class="mt-8 text-center text-slate-500 text-sm">
                Don't have an account? 
                <a class="text-primary font-semibold hover:underline" href="#">Contact sales</a>
</p>
</div>
</main>
<footer class="p-6 text-center text-xs text-slate-400 font-medium">
        © 2024 Leo Studio. All rights reserved.
    </footer>
</body></html>
